<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI模拟手机 - 防崩溃满血版</title>
    <style>
        /* ================= 基础设置 ================= */
        html, body { height: 100%; margin: 0; overflow: auto; }
        body {
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 30px; padding-bottom: 30px; background-color: #d1d5db;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            user-select: none; box-sizing: border-box;
        }

        /* ================= 手机外壳 ================= */
        .phone-frame {
            width: 390px; height: 844px;
            border: 14px solid #1a1a1a; 
            box-shadow: 0 0 0 2px #b0b0b0, 0 35px 70px rgba(0,0,0,0.3);
            border-radius: 55px; position: relative;
            display: flex; flex-direction: column; z-index: 1; background: #1a1a1a;
        }
        @media (max-height: 920px) { .phone-frame { transform: scale(0.85); transform-origin: top center; } }
        @media (max-height: 780px) { .phone-frame { transform: scale(0.75); transform-origin: top center; } }

        /* ================= 灵动岛与状态栏 ================= */
        .dynamic-island {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 34px; background-color: #000; border-radius: 20px; z-index: 999;
            box-shadow: inset 0 0 4px rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.1s;
        }
        .dynamic-island:active { transform: translateX(-50%) scale(0.95); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 25px 0 25px; font-size: 15px; font-weight: 700; z-index: 998;
            position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; transition: color 0.3s ease; pointer-events: none;
        }
        .status-light { color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
        .status-light .ios-battery { border-color: rgba(255,255,255,0.8); }
        .status-light .ios-battery::after { background: rgba(255,255,255,0.8); }
        .status-light .battery-level { background: #fff; }
        .status-dark { color: #000000; text-shadow: none; }
        .status-dark .ios-battery { border-color: #000; }
        .status-dark .ios-battery::after { background: #000; }
        .status-dark .battery-level { background: #000; }
        .status-right { display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .ios-battery { width: 24px; height: 11px; border: 1px solid; border-radius: 3px; position: relative; display: inline-block; }
        .ios-battery::after { content: ''; position: absolute; right: -4px; top: 2px; width: 2px; height: 5px; border-radius: 0 2px 2px 0; }
        .battery-level { position: absolute; top: 1px; left: 1px; bottom: 1px; width: 90%; border-radius: 1px; }
        .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 140px; height: 5px; background: #111; border-radius: 10px; z-index: 999; }

        /* ================= 屏幕容器管理器 (完美切圆角) ================= */
        .screen { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            display: none; flex-direction: column; box-sizing: border-box; 
            border-radius: 41px; overflow: hidden; background-color: #f5f6fa;
        }
        .screen.active { display: flex; animation: fade-in 0.2s ease; }
        @keyframes fade-in { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* ================= 界面1：手机桌面 ================= */
        #screen-home { background: linear-gradient(145deg, #ffd1df 0%, #e6d3fe 40%, #c4e0ff 100%); padding: 55px 25px 15px 25px; }
        #screen-home::before { content: '✨ ✦ ⋆ ✨ ✦ ⋆ ✨ ✦ ⋆'; position: absolute; top: 60px; left: -20px; width: 500px; font-size: 20px; color: rgba(255,255,255,0.8); letter-spacing: 40px; line-height: 150px; word-wrap: break-word; z-index: -1; transform: rotate(-15deg); }
        .top-shadow-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 100%); z-index: 0; pointer-events: none; }
        .top-widgets { display: flex; justify-content: space-between; height: 155px; margin-top: 5px; z-index: 1;}
        .polaroid-stack { position: relative; width: 145px; height: 100%; }
        .polaroid-1 { position: absolute; top: 15px; left: 10px; width: 110px; height: 130px; background: #fff; padding: 8px 8px 25px 8px; box-sizing: border-box; border-radius: 4px; box-shadow: 2px 8px 20px rgba(0,0,0,0.08); transform: rotate(-12deg); z-index: 1; }
        .p-img-1 { width: 100%; height: 100%; background: linear-gradient(135deg, #ff9a9e, #fecfef); display: flex; justify-content: center; align-items: center; font-size: 40px; }
        .polaroid-2 { position: absolute; top: 30px; left: 35px; width: 100px; height: 120px; background: #fff; padding: 6px 6px 20px 6px; box-sizing: border-box; border-radius: 4px; box-shadow: 4px 12px 25px rgba(0,0,0,0.12); transform: rotate(8deg); z-index: 2; }
        .p-img-2 { width: 100%; height: 100%; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); display: flex; justify-content: center; align-items: center; font-size: 35px; }
        .sticker-butterfly { position: absolute; bottom: 0px; right: 0px; font-size: 28px; transform: rotate(20deg); z-index: 3; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }
        .time-widget { width: 150px; height: 130px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 15px; }
        .time-text { font-size: 44px; font-weight: 800; color: #fff; text-shadow: 0 4px 15px rgba(255,105,180,0.4); line-height: 1; margin-bottom: 5px; }
        .date-text { font-size: 13px; font-family: "Brush Script MT", cursive; color: #835b91; margin-bottom: 15px; }
        .battery-bar { width: 80%; height: 18px; background: rgba(255,255,255,0.6); border-radius: 10px; padding: 2px; box-sizing: border-box; display: flex; align-items: center; position: relative; }
        .battery-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff9a9e, #fecfef); border-radius: 8px; }
        .battery-icon-decor { position: absolute; right: -25px; font-size: 18px; }
        .music-widget-container { margin-top: 5px; margin-bottom: 15px; z-index: 1;}
        .music-widget { width: 100%; height: 105px; background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); border-radius: 28px; padding: 15px; box-sizing: border-box; display: flex; align-items: center; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
        .cd-disk { width: 70px; height: 70px; margin-right: 18px; border-radius: 50%; background: conic-gradient(from 0deg, #ff9a9e, #fecfef, #a1c4fd, #fbc2eb, #ff9a9e); display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 15px rgba(0,0,0,0.15), inset 0 0 5px rgba(255,255,255,0.8); animation: spin-cd 4s linear infinite; }
        .cd-hole { width: 18px; height: 18px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(2px); border-radius: 50%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        @keyframes spin-cd { 100% { transform: rotate(360deg); } }
        .music-info { flex: 1; display: flex; flex-direction: column; }
        .song-title { font-size: 16px; font-weight: bold; color: #5a4b63; margin-bottom: 2px; }
        .artist { font-size: 12px; color: #9c8a9c; margin-bottom: 12px; font-family: "Brush Script MT", cursive; }
        .music-controls { display: flex; align-items: center; gap: 15px; color: #786480; font-size: 18px; }
        .sound-wave { display: flex; gap: 2px; height: 15px; align-items: flex-end; }
        .wave-bar { width: 3px; background: #c299d6; border-radius: 2px; }
        .bottom-layout { display: flex; justify-content: space-between; align-items: stretch; gap: 15px; margin-top: 5px; height: 160px; z-index: 1;}
        .memo-square { flex: 1; position: relative; background-color: #fffdf5; background-image: repeating-linear-gradient(transparent, transparent 22px, rgba(200, 150, 180, 0.3) 22px, rgba(200, 150, 180, 0.3) 23px); border-radius: 10px; box-shadow: 2px 8px 20px rgba(0,0,0,0.08); padding: 25px 12px 10px 12px; box-sizing: border-box; display: flex; flex-direction: column; }
        .memo-square::before { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(-3deg); width: 45px; height: 16px; background: rgba(255, 182, 193, 0.75); backdrop-filter: blur(2px); box-shadow: 1px 2px 4px rgba(0,0,0,0.05); border-radius: 2px; }
        .memo-title { font-size: 14px; font-weight: 800; color: #d68598; margin-bottom: 8px; }
        .memo-list { font-size: 12px; color: #6b4c7a; line-height: 1.8; font-weight: 600; }
        .memo-check { color: #d68598; margin-right: 4px; font-size: 14px;}
        .apps-2x2 { width: 145px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px 12px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .app-icon { width: 60px; height: 60px; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; transition: transform 0.2s; }
        .app-icon:active { transform: scale(0.85) rotate(-5deg); }
        .app-name { color: #5a4b63; font-size: 12px; font-weight: 600; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
        .icon-gallery { background: linear-gradient(135deg, #ffd1ff, #fad0c4); } 
        .icon-world { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }   
        .icon-setting { background: linear-gradient(135deg, #d4fc79, #96e6a1); } 
        .icon-qq { background: linear-gradient(135deg, #00c6ff, #0072ff); box-shadow: 0 0 18px rgba(0, 198, 255, 0.6); animation: pulse-glow 2s infinite alternate; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 12px rgba(0, 198, 255, 0.4); transform: translateY(0); } 100% { box-shadow: 0 0 25px rgba(0, 198, 255, 0.8); transform: translateY(-2px); } }
        .spacer { flex: 1; }
        .dock { margin: 0 0 20px 0; padding: 16px 20px; background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(25px); border-radius: 40px; display: flex; justify-content: space-around; box-shadow: 0 15px 35px rgba(0,0,0,0.08); z-index: 1;}
        .dock .app-item .app-name { display: none; }
        .dock .app-icon { width: 56px; height: 56px; border-radius: 18px; font-size: 30px; background: linear-gradient(135deg, #fdfbfb, #ebedee); box-shadow: 0 6px 15px rgba(0,0,0,0.06); }

        /* ================= 界面2：QQ消息列表 ================= */
        #screen-qq { padding-top: 55px; }
        
        .qq-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 15px 20px; background-color: #fff; }
        .qq-avatar-self { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff9a9e, #fecfef); display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
        .qq-title { font-size: 18px; font-weight: 800; color: #000; letter-spacing: 1px; }
        .qq-add-btn { font-size: 24px; color: #12B7F5; cursor: pointer; transition: transform 0.2s; }
        .qq-add-btn:active { transform: scale(0.8); }

        .qq-search-container { background-color: #fff; padding: 0 20px 10px 20px; }
        .qq-search-box { background-color: #f0f2f5; height: 36px; border-radius: 18px; display: flex; align-items: center; padding: 0 15px; color: #a0a0a0; font-size: 14px; }

        .qq-msg-list { flex: 1; overflow-y: auto; background-color: #fff; border-top-left-radius: 20px; border-top-right-radius: 20px; padding-bottom: 20px; }
        .qq-msg-list::-webkit-scrollbar { display: none; }

        .msg-item { display: flex; align-items: center; padding: 12px 20px; transition: background 0.2s; cursor: pointer; border-bottom: 1px solid #fafafa;}
        .msg-item:active { background-color: #f0f2f5; }
        .msg-avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-shrink: 0; background-size: cover; background-position: center; background-color: #eee; }
        .msg-content { flex: 1; overflow: hidden; }
        .msg-name { font-size: 16px; font-weight: 600; color: #222; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .msg-preview { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-meta { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; height: 40px;}
        .msg-time { font-size: 12px; color: #bbb; }
        .msg-badge { background-color: #ff4757; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold;}

        /* 底部导航栏也会被完美裁切圆角 */
        .qq-bottom-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0 25px 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #999; gap: 4px;}
        .nav-item.active { color: #12B7F5; }
        .nav-icon { font-size: 24px; }
        .nav-text { font-size: 10px; font-weight: 600;}

        /* 添加好友弹窗 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 290px; border-radius: 24px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: pop-up 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop-up { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .avatar-upload-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .avatar-preview { width: 75px; height: 75px; border-radius: 50%; background-color: #f8f9fa; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; background-size: cover; background-position: center; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .avatar-preview:hover { border-color: #12B7F5; background-color: #f0f8ff; }
        .avatar-placeholder-text { font-size: 12px; color: #999; text-align: center; line-height: 1.4; }
        .modal-input { width: 100%; height: 42px; border: 2px solid #eee; border-radius: 12px; padding: 0 15px; box-sizing: border-box; font-size: 14px; text-align: center; outline: none; transition: border-color 0.2s; background: #f9f9f9; }
        .modal-input:focus { border-color: #12B7F5; }
        .modal-btns { display: flex; justify-content: space-between; margin-top: 20px; gap: 15px;}
        .btn-cancel { flex: 1; padding: 12px 0; background: #f0f2f5; color: #666; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-confirm { flex: 1; padding: 12px 0; background: #12B7F5; color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(18, 183, 245, 0.3);}
        .btn-cancel:active, .btn-confirm:active { transform: scale(0.95); }


        /* ================= 界面3：1对1 聊天窗口 ================= */
        #screen-chat { padding-top: 55px; }
        
        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee; z-index: 10;
        }
        .chat-back-btn { font-size: 22px; color: #12B7F5; cursor: pointer; font-weight: bold; padding-right: 10px;}
        .chat-title { font-size: 17px; font-weight: 700; color: #000; flex: 1; text-align: center; }
        .chat-more-btn { font-size: 22px; color: #111; cursor: pointer; }

        .chat-room {
            flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .chat-room::-webkit-scrollbar { display: none; }
        .chat-time-stamp { text-align: center; font-size: 11px; color: #aaa; margin: 5px 0; }

        .bubble-row { display: flex; align-items: flex-start; max-width: 100%; }
        .bubble-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 22px;}
        .bubble-text { padding: 12px 16px; font-size: 15px; line-height: 1.5; word-break: break-all; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        .bubble-left { justify-content: flex-start; }
        .bubble-left .bubble-avatar { margin-right: 12px; border: 1px solid #eee; }
        .bubble-left .bubble-text { background-color: #fff; color: #333; border-radius: 2px 18px 18px 18px; }

        .bubble-right { justify-content: flex-end; }
        .bubble-right .bubble-avatar { margin-left: 12px; background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .bubble-right .bubble-text { background-color: #12B7F5; color: #fff; border-radius: 18px 2px 18px 18px; }

        /* 输入框底栏也会被完美裁切圆角 */
        .chat-input-area {
            background: #f5f6fa; padding: 10px 20px 25px 20px; display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid #ddd;
        }
        .chat-input-box {
            flex: 1; min-height: 40px; max-height: 100px; background: #fff; border-radius: 20px; padding: 10px 15px;
            box-sizing: border-box; font-size: 15px; outline: none; border: none; resize: none; font-family: inherit;
        }
        .chat-send-btn {
            width: 40px; height: 40px; background: #12B7F5; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(18, 183, 245, 0.4); transition: transform 0.1s;
        }
        .chat-send-btn:active { transform: scale(0.9); }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="dynamic-island" id="btn-global-home" title="点击返回桌面"></div>
        <div class="status-bar status-light" id="global-status-bar">
            <span id="status-clock">23:08</span>
            <div class="status-right">
                <span>📶</span><span>🛜</span><span class="ios-battery"><span class="battery-level"></span></span>
            </div>
        </div>

        <!-- 屏幕1：桌面 -->
        <div id="screen-home" class="screen active">
            <div class="top-shadow-overlay"></div>
            <div class="top-widgets">
                <div class="polaroid-stack"><div class="polaroid-1"><div class="p-img-1">🌸</div></div><div class="polaroid-2"><div class="p-img-2">🧸</div><div class="sticker-butterfly">🦋</div></div></div>
                <div class="time-widget"><div class="time-text" id="widget-clock">23:08</div><div class="date-text">Tuesday</div><div class="battery-bar"><div class="battery-fill"></div><span class="battery-icon-decor">⚡</span></div></div>
            </div>
            <div class="music-widget-container">
                <div class="music-widget">
                    <div class="cd-disk"><div class="cd-hole"></div></div>
                    <div class="music-info">
                        <div class="song-title">Good night, Sweetie</div><div class="artist">Now Playing...</div>
                        <div class="music-controls"><span>▶</span><span>⏸</span><div class="sound-wave"><div class="wave-bar" style="height: 60%"></div><div class="wave-bar" style="height: 100%"></div><div class="wave-bar" style="height: 40%"></div><div class="wave-bar" style="height: 80%"></div><div class="wave-bar" style="height: 50%"></div><div class="wave-bar" style="height: 90%"></div></div></div>
                    </div>
                </div>
            </div>
            <div class="bottom-layout">
                <div class="memo-square"><div class="memo-title">To-Do List 📌</div><div class="memo-list"><span class="memo-check">✔</span> 捏个人设<br><span class="memo-check">✔</span> 开启新世界<br><span class="memo-check">✔</span> 找AI聊天</div></div>
                <div class="apps-2x2">
                    <div class="app-item"><div class="app-icon icon-gallery">🖼️</div><div class="app-name">相册</div></div>
                    <div class="app-item"><div class="app-icon icon-world">🌍</div><div class="app-name">世界书</div></div>
                    <div class="app-item"><div class="app-icon icon-setting">⚙️</div><div class="app-name">设置</div></div>
                    <div class="app-item" id="btn-open-qq"><div class="app-icon icon-qq">🐧</div><div class="app-name" style="color: #0072ff; font-weight: 800;">QQ</div></div>
                </div>
            </div>
            <div class="spacer"></div>
            <div class="dock"><div class="app-item"><div class="app-icon">📞</div></div><div class="app-item"><div class="app-icon">🎀</div></div><div class="app-item"><div class="app-icon">💬</div></div><div class="app-item"><div class="app-icon">📷</div></div></div>
        </div>

        <!-- 屏幕2：QQ列表 -->
        <div id="screen-qq" class="screen">
            <div class="qq-header"><div class="qq-avatar-self">👧</div><div class="qq-title">消息</div><div class="qq-add-btn" id="btn-show-add-modal">➕</div></div>
            <div class="qq-search-container"><div class="qq-search-box">🔍 搜索</div></div>
            <div class="qq-msg-list" id="qq-message-list"></div>
            <div class="qq-bottom-nav">
                <div class="nav-item active"><div class="nav-icon">💬</div><div class="nav-text">消息</div></div>
                <div class="nav-item"><div class="nav-icon">👥</div><div class="nav-text">联系人</div></div>
                <div class="nav-item"><div class="nav-icon">🌟</div><div class="nav-text">动态</div></div>
            </div>
        </div>

        <!-- 屏幕3：聊天室 -->
        <div id="screen-chat" class="screen">
            <div class="chat-header"><div class="chat-back-btn" id="btn-chat-back">❮</div><div class="chat-title" id="chat-header-name">名字</div><div class="chat-more-btn">≡</div></div>
            <div class="chat-room" id="chat-room-box"></div>
            <div class="chat-input-area">
                <textarea class="chat-input-box" id="chat-input-text" placeholder="给TA发消息... (按回车发送)" rows="1"></textarea>
                <div class="chat-send-btn" id="btn-send-msg">➤</div>
            </div>
        </div>

        <!-- 弹窗 -->
        <div class="modal-overlay" id="add-friend-modal">
            <div class="modal-box">
                <div class="modal-title">添加新角色</div>
                <div class="avatar-upload-container">
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <div class="avatar-preview" id="avatar-preview" onclick="document.getElementById('avatar-input').click()">
                        <span class="avatar-placeholder-text">📷<br>上传头像</span>
                    </div>
                </div>
                <input type="text" class="modal-input" id="friend-name-input" placeholder="输入角色名字 (如:五条悟)">
                <div class="modal-btns">
                    <div class="btn-cancel" id="btn-cancel-add">取消</div><div class="btn-confirm" id="btn-confirm-add">确定添加</div>
                </div>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>

    <script>
        // --------- 1. 基础组件：时间更新 ---------
        function updateTime() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('status-clock').innerText = `${h}:${m}`;
            document.getElementById('widget-clock').innerText = `${h}:${m}`;
            document.querySelectorAll('.wave-bar').forEach(w => w.style.height = Math.floor(Math.random() * 80 + 20) + '%');
        }
        setInterval(updateTime, 1000); updateTime();

        // --------- 2. ★ 安全机制：本地数据初始化 (Try-Catch 防崩溃) ★ ---------
        let friends = [];
        let chatHistory = {};

        function initData() {
            try {
                // 尝试从浏览器读取数据
                const savedFriends = localStorage.getItem('myAI_friends');
                const savedChats = localStorage.getItem('myAI_chats');
                
                if (savedFriends) {
                    friends = JSON.parse(savedFriends);
                } else {
                    throw new Error("No Data"); // 如果没有数据，跳去生成默认数据
                }
                if (savedChats) {
                    chatHistory = JSON.parse(savedChats);
                }
            } catch (error) {
                // 核心：一旦报错（比如双击文件打开的安全限制），立刻切回【临时记忆】模式，保证程序不崩！
                friends = [
                    { id: 'sys_01', name: 'AI企鹅小助手', avatar: '', bg: 'linear-gradient(135deg, #12B7F5, #0098EA)', emoji: '🐧' }
                ];
                chatHistory = {
                    'sys_01': [
                        { sender: 'ai', text: '点击右上角➕号添加你的专属角色！(注: 本地打开为临时记忆，传到网页就会变成永久记忆哦)', time: '刚刚' }
                    ]
                };
            }
        }
        initData(); // 马上执行读取数据

        function saveData() {
            try {
                // 存进永久记忆
                localStorage.setItem('myAI_friends', JSON.stringify(friends));
                localStorage.setItem('myAI_chats', JSON.stringify(chatHistory));
            } catch (error) {
                // 本地打开存不进去没关系，忽略报错，继续运行临时记忆
                console.warn('本地打开无法保存永久记忆，但是网页运转依然流畅！');
            }
        }

        // --------- 3. 页面路由管理器 ---------
        const screens = document.querySelectorAll('.screen');
        const statusBar = document.getElementById('global-status-bar');

        function showScreen(screenId) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'screen-home') {
                statusBar.classList.remove('status-dark'); statusBar.classList.add('status-light');
            } else {
                statusBar.classList.remove('status-light'); statusBar.classList.add('status-dark');
            }
        }
        document.getElementById('btn-global-home').addEventListener('click', () => showScreen('screen-home'));
        document.getElementById('btn-open-qq').addEventListener('click', () => {
            renderFriendList(); 
            showScreen('screen-qq');
        });
        document.getElementById('btn-chat-back').addEventListener('click', () => {
            renderFriendList(); 
            showScreen('screen-qq');
        });

        // --------- 4. 渲染QQ消息列表 ---------
        const messageList = document.getElementById('qq-message-list');
        function renderFriendList() {
            messageList.innerHTML = '';
            [...friends].reverse().forEach(friend => {
                const history = chatHistory[friend.id] || [];
                const lastMsg = history.length > 0 ? history[history.length - 1].text : '戳一戳开始聊天吧！';
                
                let avatarStyle = friend.avatar ? `background-image: url(${friend.avatar});` : `background: ${friend.bg}; color: white;`;
                let avatarInner = friend.avatar ? '' : friend.emoji;

                const item = document.createElement('div');
                item.className = 'msg-item';
                item.innerHTML = `
                    <div class="msg-avatar" style="${avatarStyle}">${avatarInner}</div>
                    <div class="msg-content">
                        <div class="msg-name">${friend.name}</div>
                        <div class="msg-preview">${lastMsg}</div>
                    </div>
                    <div class="msg-meta"><div class="msg-time">刚刚</div><div class="msg-badge">新</div></div>
                `;
                item.addEventListener('click', () => openChatRoom(friend.id));
                messageList.appendChild(item);
            });
        }

        // --------- 5. 头像上传与安全压缩 ---------
        const addModal = document.getElementById('add-friend-modal');
        const avatarInput = document.getElementById('avatar-input');
        const avatarPreview = document.getElementById('avatar-preview');
        const nameInput = document.getElementById('friend-name-input');
        let currentUploadedAvatar = ''; 

        document.getElementById('btn-show-add-modal').addEventListener('click', () => {
            addModal.style.display = 'flex'; nameInput.value = ''; avatarInput.value = ''; currentUploadedAvatar = ''; 
            avatarPreview.style.backgroundImage = 'none'; avatarPreview.style.border = '2px dashed #ccc'; 
            avatarPreview.innerHTML = '<span class="avatar-placeholder-text">📷<br>上传头像</span>';
        });
        document.getElementById('btn-cancel-add').addEventListener('click', () => addModal.style.display = 'none');

        // 图片黑科技压缩，瞬间切圆并缩小尺寸
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 150; canvas.height = 150; 
                        const minDim = Math.min(img.width, img.height);
                        const startX = (img.width - minDim) / 2;
                        const startY = (img.height - minDim) / 2;
                        ctx.drawImage(img, startX, startY, minDim, minDim, 0, 0, 150, 150);
                        
                        currentUploadedAvatar = canvas.toDataURL('image/jpeg', 0.8);
                        avatarPreview.style.backgroundImage = `url(${currentUploadedAvatar})`;
                        avatarPreview.innerHTML = ''; avatarPreview.style.border = 'none';
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 确定添加角色
        document.getElementById('btn-confirm-add').addEventListener('click', () => {
            const friendName = nameInput.value.trim(); 
            if (!currentUploadedAvatar) return alert('请上传一张头像哦！');
            if (!friendName) return alert('名字不能为空哦！');

            const newId = 'user_' + Date.now(); 
            friends.push({ id: newId, name: friendName, avatar: currentUploadedAvatar });
            chatHistory[newId] = [ { sender: 'ai', text: '我通过了你的朋友验证请求，现在我们可以开始聊天了', time: '刚刚' } ];
            
            saveData(); 
            renderFriendList(); 
            addModal.style.display = 'none';
        });

        // --------- 6. 1对1 聊天室业务 ---------
        const chatRoomBox = document.getElementById('chat-room-box');
        const chatInputText = document.getElementById('chat-input-text');
        let currentChatId = null;

        function openChatRoom(friendId) {
            currentChatId = friendId;
            const friend = friends.find(f => f.id === friendId);
            document.getElementById('chat-header-name').innerText = friend.name;
            
            chatRoomBox.innerHTML = ''; 
            const now = new Date();
            chatRoomBox.innerHTML += `<div class="chat-time-stamp">${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}</div>`;

            const history = chatHistory[friendId] || [];
            history.forEach(msg => {
                if(msg.sender === 'me') renderMyMsg(msg.text);
                else renderFriendMsg(friend, msg.text);
            });

            showScreen('screen-chat');
            chatRoomBox.scrollTop = chatRoomBox.scrollHeight; 
        }

        function renderMyMsg(text) {
            chatRoomBox.insertAdjacentHTML('beforeend', `
                <div class="bubble-row bubble-right"><div class="bubble-text">${text}</div><div class="bubble-avatar">👧</div></div>
            `);
            chatRoomBox.scrollTop = chatRoomBox.scrollHeight;
        }

        function renderFriendMsg(friend, text) {
            let avatarStyle = friend.avatar ? `background-image: url(${friend.avatar});` : `background: ${friend.bg}; color: white;`;
            let avatarInner = friend.avatar ? '' : friend.emoji;
            chatRoomBox.insertAdjacentHTML('beforeend', `
                <div class="bubble-row bubble-left"><div class="bubble-avatar" style="${avatarStyle}">${avatarInner}</div><div class="bubble-text">${text}</div></div>
            `);
            chatRoomBox.scrollTop = chatRoomBox.scrollHeight;
        }

        function sendMessage() {
            const text = chatInputText.value.trim();
            if (!text || !currentChatId) return;
            const friend = friends.find(f => f.id === currentChatId);

            chatHistory[currentChatId].push({ sender: 'me', text: text, time: '刚刚' });
            saveData();
            
            renderMyMsg(text);
            chatInputText.value = '';

            setTimeout(() => {
                const replyText = `(AI思考中...) 等你连上大模型，我就可以根据人设来回复这句 "${text}" 啦！`;
                chatHistory[currentChatId].push({ sender: 'ai', text: replyText, time: '刚刚' });
                saveData();
                renderFriendMsg(friend, replyText);
            }, 1000);
        }

        document.getElementById('btn-send-msg').addEventListener('click', sendMessage);
        chatInputText.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

    </script>
</body>
</html>
